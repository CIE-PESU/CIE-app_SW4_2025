services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: cie_database
      POSTGRES_USER: cie_user
      POSTGRES_PASSWORD: cie_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://cie_user:cie_password@db:5432/cie_database
      - NEXTAUTH_URL=http://localhost:3000
      - NEXTAUTH_SECRET=ToN0qkE8HIDGRMgizpmdBOJPcKWewZaF
      - NODE_ENV=development
      - MISTRAL_API_KEY=your-mistral-api-key-here
      - GEMINI_API_KEY=your-gemini-api-key-here
    depends_on:
      - db
    volumes:
      - .:/app
      - /app/node_modules
    command: pnpm dev

volumes:
  postgres_data: